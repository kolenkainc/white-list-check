name: Android CI

# INGEST_TOKEN: тот же bearer, что на Worker (Cloudflare Secrets Store или wrangler secret).
# API Cloudflare не отдаёт значение секрета после создания — при настройке один раз продублируйте
# его в GitHub → Settings → Secrets → Actions → INGEST_TOKEN (для вшивания в BuildConfig на CI).

on:
  push:
    branches:
      - master
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches:
      - master
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  debug-apk:
    name: Debug APK
    concurrency:
      group: android-debug-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Point Gradle at the SDK
        working-directory: android
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9
          build-root-directory: android

      - name: Assemble debug APK
        env:
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        working-directory: android
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  release:
    name: Tag → Build → GitHub Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: android-release-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Next SemVer tag and version metadata
        id: bump
        run: |
          set -euo pipefail
          git fetch --tags --force
          LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1 || true)"
          if [ -z "${LATEST}" ]; then
            TAG="v1.0.0"
          else
            VER="${LATEST#v}"
            MA="${VER%%.*}"
            REST="${VER#*.}"
            MI="${REST%%.*}"
            PA="${REST#*.}"
            PA=$((PA + 1))
            TAG="v${MA}.${MI}.${PA}"
          fi
          while git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; do
            VER="${TAG#v}"
            MA="${VER%%.*}"
            REST="${VER#*.}"
            MI="${REST%%.*}"
            PA="${REST#*.}"
            PA=$((PA + 1))
            TAG="v${MA}.${MI}.${PA}"
          done
          NAME="${TAG#v}"
          CODE=$((MA * 1000000 + MI * 1000 + PA))
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "code=${CODE}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Point Gradle at the SDK
        working-directory: android
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9
          build-root-directory: android

      - name: Optional release keystore
        env:
          RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -n "${RELEASE_KEYSTORE_B64:-}" ]; then
            echo "${RELEASE_KEYSTORE_B64}" | base64 -d > "${GITHUB_WORKSPACE}/release-upload.keystore"
          fi

      - name: Assemble release APK
        env:
          VERSION_NAME: ${{ steps.bump.outputs.name }}
          VERSION_CODE: ${{ steps.bump.outputs.code }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        working-directory: android
        run: |
          if [ -f ../release-upload.keystore ]; then
            export RELEASE_KEYSTORE_FILE=../release-upload.keystore
          fi
          gradle assembleRelease --stacktrace --no-daemon

      # Тот же идентификатор, что BuildConfig.SENTRY_RELEASE (app/build.gradle.kts → sentryRelease).
      - name: Sentry release + коммиты (ссылки на GitHub в стектрейсах)
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: kolenka-inc
          SENTRY_PROJECT: whitelistcheck-android
        with:
          environment: production
          version: tech.romashov.whitelistcheck@${{ steps.bump.outputs.name }}+${{ steps.bump.outputs.code }}
          set_commits: auto

      - name: Prepare release asset
        env:
          VERSION_NAME: ${{ steps.bump.outputs.name }}
        run: |
          mkdir -p upload
          cp "android/app/build/outputs/apk/release/app-release.apk" \
            "upload/white-list-check-${VERSION_NAME}.apk"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: upload/white-list-check-${{ steps.bump.outputs.name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
