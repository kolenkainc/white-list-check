name: Build APK

# Debug-сборка на master/main не нужна — там идёт release-on-master.yml
on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Point Gradle at the SDK
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Совпадает с gradle/wrapper/gradle-wrapper.properties — без скачивания дистрибутива через gradlew
          gradle-version: 8.9

      - name: Assemble debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
