name = "white-list-check-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"

# Кастомный домен (прод): https://white-list-check-api.romashov.tech
# Зона romashov.tech должна быть в том же аккаунте Cloudflare, что и Worker.
# Только hostname: для custom_domain нельзя /*, пути и wildcard — иначе Invalid Routes.
[[routes]]
pattern = "white-list-check-api.romashov.tech"
custom_domain = true

# Workers Logs: дашборд → Worker → Observability
# https://developers.cloudflare.com/workers/observability/logs/workers-logs/
[observability]
enabled = true
# 1.0 = все запросы; при высоком трафике уменьшите (например 0.1 = 10%)
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "white-list-check"
database_id = "99e66877-4477-4835-b256-0c134a8cf8ac"

# Локально: npx wrangler d1 migrations apply white-list-check --local
# Прод:   npx wrangler d1 migrations apply white-list-check --remote

# Опционально: wrangler secret put INGEST_TOKEN — тогда POST /api/v1/ips требует Authorization: Bearer …
