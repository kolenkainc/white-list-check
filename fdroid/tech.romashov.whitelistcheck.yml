License: Apache-2.0
AuthorName: Dmitriy Romashov
WebSite: https://romashov.tech
SourceCode: https://github.com/YOUR_GITHUB_USER/YOUR_REPO_NAME
IssueTracker: https://github.com/YOUR_GITHUB_USER/YOUR_REPO_NAME/issues
RepoType: git
Repo: https://github.com/YOUR_GITHUB_USER/YOUR_REPO_NAME.git
AutoName: true
Summary: Background check that an IP from your HTTPS endpoint is reachable
Description: |
  The app loads an IPv4 from a configurable HTTPS URL (JSON field ip/address/target/host or plain text),
  then checks TCP reachability (ports 443, 80, 22). Monitoring runs in a foreground service with a
  persistent notification; it can restart after boot when enabled.

  Default URL in upstream sources is https://romashov.tech/test-ip — replace it in the app if your
  server returns the address in the response body.

  Permissions: INTERNET, foreground service (data sync), optional POST_NOTIFICATIONS on newer Android,
  RECEIVE_BOOT_COMPLETED when resuming monitoring.

MaintainerNotes: |
  versionCode/versionName are taken from env VERSION_CODE and VERSION_NAME (see app/build.gradle.kts).
  Each Builds entry must export matching values in init before Gradle.

  After the first upstream release tag exists, set commit to that tag and align versionName,
  versionCode, and init exports with the tag (versionCode = MAJOR*1000000 + MINOR*1000 + PATCH).

  Replace YOUR_GITHUB_USER/YOUR_REPO_NAME with the real GitHub coordinates before submitting to fdroiddata.

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9]+\.[0-9]+\.[0-9]+$
CurrentVersion: 1.0.0
CurrentVersionCode: 1000000

Builds:
  - versionName: 1.0.0
    versionCode: 1000000
    commit: v1.0.0
    init:
      - export VERSION_CODE=1000000
      - export VERSION_NAME=1.0.0
    gradle:
      - yes
